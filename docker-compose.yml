services:
  db:
    image: postgres:15-alpine
    container_name: shou-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-shou_db}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: shou-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: shou-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-shou_db}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5001,http://localhost:5002,http://localhost:5003}
      NODE_ENV: production
      PORT: 3000
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      IMPORT_JOB_WORKER_ENABLED: "false"
      LAKALA_CASHIER_URL_PREFIX: ${LAKALA_CASHIER_URL_PREFIX:-https://cashier.lakala.com/pay?tradeNo=}
    depends_on:
      - db
      - redis
    restart: always

  import-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: shou-import-worker
    command: ["sh", "-c", "node_modules/.bin/prisma db push --skip-generate && node dist/import-worker.main"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-shou_db}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5001,http://localhost:5002,http://localhost:5003}
      NODE_ENV: production
      PORT: 3000
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      IMPORT_JOB_WORKER_ENABLED: "true"
      LAKALA_CASHIER_URL_PREFIX: ${LAKALA_CASHIER_URL_PREFIX:-https://cashier.lakala.com/pay?tradeNo=}
    depends_on:
      - db
      - redis
      - api
    restart: always

  nginx:
    image: nginx:alpine
    container_name: shou-nginx
    ports:
      - "5001:5001"
      - "5002:5002"
      - "5003:5003"
    volumes:
      - ./dist/admin:/usr/share/nginx/admin
      - ./dist/tenant:/usr/share/nginx/tenant
      - ./dist/h5:/usr/share/nginx/pay-h5
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    restart: always

volumes:
  pgdata:
  redisdata:
