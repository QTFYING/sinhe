services:
  db:
    image: postgres:15-alpine
    container_name: distributor-pay-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-distributor_pay}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: distributor-pay-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: distributor-pay-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-distributor_pay}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret}
      NODE_ENV: production
    depends_on:
      - db
      - redis
    restart: always

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    container_name: distributor-pay-nginx
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
    depends_on:
      - api
    restart: always

volumes:
  pgdata:
  redisdata:
