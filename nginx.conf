# 经销商订单收款平台 - Nginx 配置（Docker 容器内）
#
# 生产域名映射：
# - mp.shoudanba.cn  -> 5001
# - www.shoudanba.cn -> 5002
# - h5.shoudanba.cn  -> 5003
#
# 当前仍保留 5001/5002/5003 端口直连能力，便于回源排查与过渡联调。

# OS 运营管理台 - https://mp.shoudanba.cn （回源端口 5001）
server {
    listen 5001;
    server_name mp.shoudanba.cn _;

    root /usr/share/nginx/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# 租户工作台 - https://www.shoudanba.cn （回源端口 5002）
server {
    listen 5002;
    server_name www.shoudanba.cn _;

    root /usr/share/nginx/tenant;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# C 端收款 H5 - https://h5.shoudanba.cn （回源端口 5003）
server {
    listen 5003;
    server_name h5.shoudanba.cn _;

    root /usr/share/nginx/pay-h5;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
